version: 1.1.5

# 1. BALANCE: This replaces the deprecated CHECK_BALANCE variable
balance:
  enabled: false # Set to true if you want to track your own token credits

# 2. PERMISSIONS
endpoints:
  openAI:
    models:
      default:
        - "gpt-4o"
        - "gpt-4o-2024-08-06"
        - "gpt-4o-2024-05-13"
        - "gpt-4o-mini"
      fetch: false
    titleModel: "gpt-4o-mini"

# 3. INTERFACE: Clean and minimal to avoid conflicts
interface:
  endpointsMenu: false
  modelSelect: false
  parameters: false
  presets: false
  sidePanel: true
  bookmarks: true
  multiConvo: true
  agents:
    use: true
    create: true

modelSpecs:
  enforce: true
  prioritize: true
  list:

    - name: "gpt-4o-latest"
      label: "GPT-4o (Latest)"
      preset:
        endpoint: "openAI"
        model: "gpt-4o"
        additional_params:
          store: true

    - name: "monster-agent"
      label: "Monster Persona (Agent)"
      preset:
        endpoint: "agents"
        # REPLACE THIS with the actual ID from your Agent settings in the UI
        agent_id: "ded38a22-6197-45eb-ae92-ec6145f28b84"
        
    - name: "gpt-4o-aug-snapshot"
      label: "GPT-4o (Aug 2024 Snapshot)"
      preset:
        endpoint: "openAI"
        model: "gpt-4o-2024-08-06"
        additional_params:
          store: true

    - name: "gpt-4o-may-snapshot"
      label: "GPT-4o (May Snapshot)"
      preset:
        endpoint: "openAI"
        model: "gpt-4o-2024-05-13"
        additional_params:
          store: true

# 5. SPEECH: Unified and safe
speech:
  tts:
    elevenlabs:
      apiKey: '${ELEVENLABS_API_KEY}'
      model: 'eleven_v3'
      voices:
        - 'BkC7XItiZYxZjAc84fj2'
      voice_settings:
        stability: 0.3
        similarity_boost: 0.75
        style: 0.0
        use_speaker_boost: true
  speechTab:
    automaticPlayback: false
