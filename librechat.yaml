version: 1.1.5

# 1. BALANCE: This replaces the deprecated CHECK_BALANCE variable
balance:
  enabled: true
  startBalance: 3750000
  autoRefillEnabled: false
  
# 2. PERMISSIONS
endpoints:
  openAI:
    addParams:
      store: true
    models:
      default:
        - "gpt-4o"
        - "gpt-4o-2024-08-06"
        - "gpt-4o-2024-05-13"
        - "gpt-4o-mini"
      fetch: false
    titleModel: "gpt-4o-mini"
  agents:
    recursionLimit: 50
    capabilities:
      - "file_search"
      - "context"
    maxCitations: 20
    minRelevanceScore: 0.0

# 3. INTERFACE: Clean and minimal to avoid conflicts
interface:
  endpointsMenu: true
  parameters: true
  presets: false
  sidePanel: true
  bookmarks: true
  memories: true
  multiConvo: true
  modelSelect: true
  agents:
    use: true
    create: true

modelSpecs:
  enforce: false
  prioritize: true
  list:
    - name: "gpt-4o-latest"
      label: "GPT-4o (Latest)"
      capabilities: ["responses"]
      preset:
        endpoint: "openAI"
        model: "gpt-4o"
        addParams:
          store: true

    - name: "monster-agent"
      label: "Monster Persona (Active)"
      preset:
        endpoint: "agents"
        agent_id: "agent_YT2zkER5FFV9f0seCGNzK" # Use your real ID here
        
    - name: "gpt-4o-aug-snapshot"
      label: "GPT-4o (Aug 2024 Snapshot)"
      capabilities: ["responses"]
      preset:
        endpoint: "openAI"
        model: "gpt-4o-2024-08-06"
        addParams:
          store: true

    - name: "gpt-4o-may-snapshot"
      label: "GPT-4o (May Snapshot)"
      capabilities: ["responses"]
      preset:
        endpoint: "openAI"
        model: "gpt-4o-2024-05-13"
        addParams:
          store: true

memory:
  disabled: false        # Turns the feature ON
  personalize: true      # Shows the "Memory" toggle in the chat UI
  tokenLimit: 3000       # How much the "secretary" can remember
  messageWindowSize: 8   # How many recent messages to look at for new memories
  agent:
    provider: "openAI"   # Use OpenAI (fast/reliable) to run the memory brain
    model: "gpt-4o-mini" # Low-cost, fast model for memory processing
    instructions: |
      You are the memory assistant for 'The Monster'. 
      Focus on extracting user preferences, core behavioral patterns, and relationship dynamics.
      
# 5. SPEECH: Unified and safe
speech:
  tts:
    elevenlabs:
      apiKey: '${ELEVENLABS_API_KEY}'
      model: 'eleven_v3'
      voices:
        - 'BkC7XItiZYxZjAc84fj2'
      voice_settings:
        stability: 0.3
        similarity_boost: 0.75
        style: 0.0
        use_speaker_boost: true
  speechTab:
    automaticPlayback: false

