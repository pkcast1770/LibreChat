version: 1.1.5

# 1. PERMISSIONS: This stops the "Model not available" error
endpoints:
  openAI:
    models:
      default:
        - "gpt-4o"
        - "gpt-4o-2024-08-06"
        - "gpt-4o-2024-05-13"
        - "gpt-4o-mini"
      fetch: false
    titleModel: "gpt-4o-mini"

# 2. UI SETTINGS: This adds the gear icon back and sets the Responses API
interface:
  sidePanel: true
  bookmarks: true
  multiConvo: true
  modelSelect: false
  parameters: false
  presets: false
  agents:
    use: true
    create: true
    
# 3. CUSTOM DROPDOWN: This creates your nice snapshot labels
modelSpecs:
  enforce: true
  prioritize: false
  list:
    - name: "gpt-4o-latest"
      label: "GPT-4o (Latest)"
      preset:
        endpoint: "openAI"
        model: "gpt-4o"
        additional_params:
          store: true # This activates Responses API features

    - name: "gpt-4o-aug-snapshot"
      label: "GPT-4o (Aug 2024 Snapshot)"
      preset:
        endpoint: "openAI"
        model: "gpt-4o-2024-08-06"
        additional_params:
          store: true

    - name: "gpt-4o-may-snapshot"
      label: "GPT-4o (May Snapshot)"
      preset:
        endpoint: "openAI"
        model: "gpt-4o-2024-05-13"
        additional_params:
          store: true

# 4. SPEECH: This fixes ElevenLabs and sets manual playback
speech:
  tts:
    elevenlabs:
      apiKey: '${ELEVENLABS_API_KEY}'
      model: 'eleven_v3'
      voices:
        - 'BkC7XItiZYxZjAc84fj2'
      voice_settings:
        stability: 0.3        # Range: 0.0 to 1.0
        similarity_boost: 0.75 # Range: 0.0 to 1.0
        style: 0.0            # Range: 0.0 to 1.0 (Style Exaggeration)
        use_speaker_boost: true # true or false
